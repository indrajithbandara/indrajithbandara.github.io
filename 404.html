<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Page Not Found · Indrajith Bandara</title>
  <meta name="robots" content="noindex, follow" />
  <link rel="icon" type="image/svg+xml" href="assets/icons/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0d0c; --text: #edf2f0; --text-dim: #93a39e;
      --accent: #00e08f; --border: rgba(255,255,255,0.1);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg); color: var(--text);
      font-family: "JetBrains Mono", monospace;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; text-align: center; padding: 24px;
    }
    .code {
      font-family: "Space Grotesk", sans-serif;
      font-size: clamp(64px, 14vw, 140px);
      font-weight: 700; color: var(--accent);
      line-height: 1;
    }
    .msg { color: var(--text-dim); margin: 16px 0 28px; font-size: 14px; }
    .terminal-line { margin-bottom: 28px; font-size: 13px; }
    .terminal-line span { color: var(--accent); }
    a.home {
      border: 1px solid var(--border); border-radius: 8px;
      padding: 12px 22px; font-size: 13.5px; color: var(--text);
      text-decoration: none; transition: 0.25s ease;
    }
    a.home:hover { border-color: var(--accent); color: var(--accent); }
  </style>
</head>
<body>
  <p class="terminal-line"><span>guest@indrajith:~$</span> cd /requested-page</p>
  <div class="code">404</div>
  <p class="msg">No such file or directory. The page you're looking for doesn't exist.</p>
  <a class="home" href="/">cd ~  (back to homepage)</a>
</body>
</html>
